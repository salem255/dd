<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Network Download Center</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f3f4f6;
}

.header{
background:#1f2937;
color:white;
padding:25px;
text-align:center;
}

.header h1{
margin-bottom:10px;
}

.search{
max-width:700px;
margin:20px auto;
padding:0 15px;
}

.search input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

#filesContainer{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-body h3{
margin-bottom:10px;
}

.card-body p{
margin-bottom:8px;
color:#555;
}

.download-btn{
display:block;
background:#2563eb;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
margin-top:10px;
}

.download-btn:hover{
background:#1d4ed8;
}

.footer{
text-align:center;
padding:20px;
color:#666;
}

</style>

</head>

<body>

<div class="header">

<h1>📦 Network Download Center</h1>

<p>دامبات - سوفت وير - برامج الشبكات</p>

</div>

<div class="search">

<input
type="text"
id="search"
placeholder="ابحث عن ملف...">

</div>

<div id="filesContainer"></div>

<div class="footer">

Powered By Firebase

</div>

<script type="module"
src="assets/js/app.js"></script>

</body>
</html>
